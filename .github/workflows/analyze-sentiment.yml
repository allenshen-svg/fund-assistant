name: 📊 舆情采集 & AI分析 (已迁移至生产服务器)

# 已迁移至生产服务器后台线程 (scheduler_loop 每30分钟采集 + 定时AI分析)
# 数据文件已从 git 追踪中移除，不再需要 GitHub Actions 推送

# on:
#   schedule:
#     - cron: '0 * * * *'
#   workflow_dispatch:
on:
  workflow_dispatch:
    inputs:
      note:
        description: '此工作流已停用，舆情分析由生产服务器自动执行'
        required: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check schedule (trading day 1h / non-trading 2h)
        id: schedule
        run: |
          python3 - <<'PYEOF'
          import datetime, os

          # 北京时间
          utc_now = datetime.datetime.now(datetime.timezone.utc)
          cst = utc_now + datetime.timedelta(hours=8)
          weekday = cst.weekday()   # 0=Monday ... 6=Sunday
          hour = cst.hour

          # A股交易时段: 周一~五 9:00-11:30, 13:00-15:00
          is_trading_day = weekday < 5
          minute = cst.minute
          in_trading_session = is_trading_day and (
              (9 <= hour <= 11) or (13 <= hour <= 14) or (hour == 15 and minute == 0)
          )

          # 交易时段: 每 1 小时 | 其余时间(含交易日盘后+周末): 每 2 小时(偶数点, 08-22)
          if in_trading_session:
              should_run = True
          else:
              should_run = (hour % 2 == 0) and (8 <= hour <= 22)

          print(f"CST: {cst.strftime('%Y-%m-%d %H:%M')} weekday={weekday} trading={is_trading_day} run={should_run}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
          PYEOF

      - name: Collect & Analyze
        if: steps.schedule.outputs.should_run == 'true'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
        run: |
          cd scripts
          python3 -c "
          from collector import collect_and_save
          data = collect_and_save(run_analysis=True)
          print(f'Done: {data[\"total\"]} items, time: {data[\"fetch_time\"]}')
          "

      - name: Commit & Push
        if: steps.schedule.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sentiment_cache.json data/analysis_cache.json data/us_market_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: 更新舆情分析 $(TZ=Asia/Shanghai date '+%m-%d %H:%M')"
            git push
          fi
