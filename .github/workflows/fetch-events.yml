name: 📡 宏观事件自动追踪 (已迁移至生产服务器)

# 已迁移至生产服务器后台线程 (scheduler_loop + realtime_breaking_loop)
# 数据文件已从 git 追踪中移除，不再需要 GitHub Actions 推送
# 如需重新启用，取消下方注释并将 data 文件重新加入 git 追踪

# on:
#   schedule:
#     - cron: '*/30 * * * *'
#   workflow_dispatch:
on:
  workflow_dispatch:
    inputs:
      note:
        description: '此工作流已停用，舆情采集由生产服务器自动执行'
        required: false

permissions:
  contents: write

jobs:
  fetch-events:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch & Process Events
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python scripts/fetch_events.py
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hot_events.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: 更新宏观事件 $(TZ=Asia/Shanghai date '+%m-%d %H:%M')"
            git push
          fi
